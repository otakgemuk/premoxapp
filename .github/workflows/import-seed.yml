# Import seed data into the Sanity dataset
#
# Manual trigger ONLY (Actions tab → Import Sanity Seed Data → Run workflow).
#
# ⚠️  Uses --replace: documents in seed-data.ndjson OVERWRITE any existing
#     documents with the same _id. Manual edits made in the Studio to those
#     documents will be lost. Run this to (re)initialize the dataset, not as
#     a routine sync.
#
# Imports 21 firms + 225 plans from studio/scripts/seed-data.ndjson
# into project 3d6emtst, dataset "production".
#
# A sanitize step rewrites document IDs/slugs to Sanity's allowed charset
# [A-Za-z0-9_-] (the raw seed contains IDs like "...premium-(no-act)" and
# "...3.5k..." which Sanity rejects). Firm references are remapped to match.
#
# Requires repo secret SANITY_AUTH_TOKEN with EDITOR (or Developer)
# permissions — Viewer and Deploy Studio tokens cannot create documents.

name: Import Sanity Seed Data

on:
  workflow_dispatch:

jobs:
  import-seed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Diagnose token identity and role
        # Prints WHICH robot user the secret resolves to and its role on
        # project 3d6emtst. Never prints the token itself.
        run: |
          echo "── Token identity (api.sanity.io/v1/users/me) ──"
          ME=$(curl -s -H "Authorization: Bearer $SANITY_AUTH_TOKEN" https://api.sanity.io/v1/users/me)
          echo "$ME" | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin)
              print('  id:        ', d.get('id'))
              print('  name:      ', d.get('displayName') or d.get('name'))
              print('  type:      ', 'robot/token' if str(d.get('id','')).startswith(('g-','r')) else 'user')
          except Exception:
              print('  could not parse /users/me response — token may be invalid')
          "
          echo "── Role on project 3d6emtst ──"
          curl -s -H "Authorization: Bearer $SANITY_AUTH_TOKEN" "https://api.sanity.io/v2021-06-07/projects/3d6emtst" | python3 -c "
          import json,sys
          try:
              p=json.load(sys.stdin)
              if 'members' not in p:
                  print('  API response:', json.dumps(p)[:200]); raise SystemExit
              for m in p['members']:
                  roles=[r.get('name') for r in m.get('roles',[])]
                  print(f\"  member {m.get('id')}: roles={roles}\")
              print()
              print('  → The robot id from /users/me above must appear here with')
              print('    role \"editor\", \"developer\" or \"administrator\".')
              print('    If it shows \"viewer\" or only \"deploy-studio\", the token')
              print('    role is wrong. If it is missing entirely, the GitHub')
              print('    secret still holds an OLD token.')
          except SystemExit:
              pass
          except Exception as e:
              print('  could not parse project response:', e)
          "
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}

      - name: Install dependencies
        working-directory: studio
        run: npm install --no-audit --no-fund

      - name: Sanitize document IDs
        working-directory: studio
        run: |
          python3 - <<'PYEOF'
          import json, re

          def clean(s):
              s = re.sub(r'[^A-Za-z0-9_-]+', '-', s)
              return re.sub(r'-{2,}', '-', s).strip('-')

          out = []
          with open('scripts/seed-data.ndjson') as f:
              for line in f:
                  line = line.strip()
                  if not line: continue
                  d = json.loads(line)
                  d['_id'] = clean(d['_id'])
                  if isinstance(d.get('firm'), dict) and d['firm'].get('_ref'):
                      d['firm']['_ref'] = clean(d['firm']['_ref'])
                  for k in ('planId', 'firmId', 'slug'):
                      if isinstance(d.get(k), dict) and d[k].get('current'):
                          d[k]['current'] = clean(d[k]['current'])
                  out.append(json.dumps(d, ensure_ascii=False))

          open('scripts/seed-clean.ndjson', 'w').write('\n'.join(out) + '\n')

          # Fail fast on collisions or dangling references
          docs = [json.loads(l) for l in out]
          ids = [d['_id'] for d in docs]
          assert len(ids) == len(set(ids)), 'duplicate IDs after sanitize'
          firms = {d['_id'] for d in docs if d['_type'] == 'firm'}
          refs = {d['firm']['_ref'] for d in docs if d['_type'] == 'plan'}
          assert not (refs - firms), f'dangling refs: {refs - firms}'
          print(f'sanitized {len(docs)} docs OK')
          PYEOF

      - name: Import seed data
        working-directory: studio
        run: npx sanity dataset import scripts/seed-clean.ndjson --dataset production --replace
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}

      - name: Verify import
        working-directory: studio
        run: |
          npx sanity documents query '{"firms": count(*[_type == "firm"]), "plans": count(*[_type == "plan"])}' --dataset production
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
