# Deploy to GitHub Pages
#
# Triggers:
#   - Push to main (any file change)
#   - Manual trigger from GitHub UI
#
# Steps:
#   1. Install frontend dependencies
#   2. Build the Vite app
#   3. Copy data/plans.json into the dist output
#   4. Deploy to GitHub Pages

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # npm install (not ci) so package.json edits via GitHub web UI
        # never fail on lockfile mismatch — repo is managed without local git
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Audit dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high || true

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_ADMIN_HASH: ${{ secrets.VITE_ADMIN_HASH }}
          VITE_SANITY_PROJECT_ID: 3d6emtst
          VITE_SANITY_DATASET: production

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (Actions source) on this repo if not yet enabled
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
